<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA - Panel del Profesor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --verde-uabc: #004d40;
            --verde-claro: #00796b;
            --blanco: #ffffff;
            --gris-fondo: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo);
            margin: 0;
            padding: 20px;
        }

        .header {
            background: var(--verde-uabc);
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: var(--blanco);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h3 {
            color: var(--verde-uabc);
            border-bottom: 2px solid var(--verde-claro);
            padding-bottom: 10px;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: var(--verde-claro);
            color: white;
            padding: 15px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            color: #333;
            font-size: 15px;
        }

        .hora-tag {
            background: #e0f2f1;
            color: var(--verde-uabc);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
        }

        .aula-tag {
            background: #eceff1;
            color: #455a64;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }

        .btn-logout {
            background: #546e7a;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            float: right;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background: #37474f;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0;">Panel Docente</h1>
        <p style="opacity: 0.9;">Bienvenido, Prof. Angel Ramirez</p>
    </div>

    <div class="card">
        <h3>Mis Clases Programadas</h3>
        <table>
            <thead>
                <tr>
                    <th>Horario</th>
                    <th>Materia</th>
                    <th>Carrera</th>
                    <th>Ubicación</th>
                </tr>
            </thead>
            <tbody id="tablaProfesor">
                </tbody>
        </table>
        
        <button class="btn-logout" onclick="window.location.href='index.html'">Cerrar Sesión</button>
        <div style="clear:both;"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://sigea-uabc-37a9a-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Nombre del profesor logueado
    const nombreDocente = "Angel Ramirez";

    // Función para buscar en todos los salones del Edificio E1, Piso 2
    function cargarAgendaDocente() {
        // En un sistema real, buscaríamos en todos los edificios/pisos, 
        // aquí buscamos en el nodo del prototipo (Piso 2, Aula 201)
        db.ref('edificios/E1/piso2/201/agenda').on('value', (snap) => {
            const tabla = document.getElementById('tablaProfesor');
            tabla.innerHTML = "";

            if (snap.exists()) {
                let tieneClases = false;
                snap.forEach(child => {
                    const clase = child.val();
                    
                    // FILTRO: Solo mostrar las clases que pertenecen a este profesor
                    if (clase.profesor === nombreDocente) {
                        tieneClases = true;
                        tabla.innerHTML += `
                            <tr>
                                <td><span class="hora-tag">${clase.h_i}:${clase.m_i.toString().padStart(2,'0')} - ${clase.h_f}:${clase.m_f.toString().padStart(2,'0')}</span></td>
                                <td><b>${clase.materia}</b></td>
                                <td>${clase.carrera}</td>
                                <td><span class="aula-tag">E1 - Aula 201</span></td>
                            </tr>`;
                    }
                });

                if (!tieneClases) {
                    tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#999;'>No tiene clases asignadas para este salón.</td></tr>";
                }
            } else {
                tabla.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#999;'>No hay agenda disponible en el sistema.</td></tr>";
            }
        });
    }

    cargarAgendaDocente();
</script>

</body>
</html>
