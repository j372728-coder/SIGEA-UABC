<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGEA - Panel del Profesor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root {
            --verde-uabc: #004d40;
            --verde-claro: #00796b;
            --rojo-uabc: #b71c1c;
            --azul-uabc: #01579b;
            --gris-fondo: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--gris-fondo); margin: 0; padding: 20px; }
        .header { background: var(--verde-uabc); color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: var(--verde-uabc); border-bottom: 2px solid var(--verde-claro); padding-bottom: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: var(--verde-claro); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        .hora-tag { background: #e0f2f1; color: var(--verde-uabc); padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        
        /* Botones */
        .btn { padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; border: none; transition: 0.3s; }
        
        .btn-iniciar { background: var(--verde-uabc); color: white; margin-right: 5px; }
        .btn-iniciar:hover { background: #00251a; }
        
        .btn-terminar { background: var(--azul-uabc); color: white; margin-right: 5px; }

        .btn-cancelar { 
            background: white; 
            color: var(--rojo-uabc); 
            border: 1px solid var(--rojo-uabc); 
        }
        .btn-cancelar:hover { background: var(--rojo-uabc); color: white; }
        
        .btn-logout { background: #666; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; float: right; margin-top: 20px; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-on { background: #c8e6c9; color: #2e7d32; }
        .status-off { background: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Panel de Control Docente</h1>
        <p>Bienvenido, Prof. Angel Ramirez</p>
    </div>

    <div class="card">
        <h3>Gestión de Clases y Asistencia Real</h3>
        <table>
            <thead>
                <tr>
                    <th>Horario</th>
                    <th>Materia</th>
                    <th>Estado</th>
                    <th>Acciones de Energía</th>
                    <th>Agenda</th>
                </tr>
            </thead>
            <tbody id="tablaProfesor"></tbody>
        </table>
        
        <button class="btn-logout" onclick="window.location.href='index.html'">Cerrar Sesión</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://sigea-uabc-37a9a-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const nombreDocente = "Angel Ramirez";
    const rutaAula = 'edificios/E1/piso2/201'; // Ruta raíz del aula

    function cargarClases() {
        // Escuchamos la asistencia global del aula para actualizar los botones
        db.ref(`${rutaAula}/config/asistencia`).on('value', (asistenciaSnap) => {
            const estaActiva = asistenciaSnap.val() === true;

            db.ref(`${rutaAula}/agenda`).on('value', (snap) => {
                const tabla = document.getElementById('tablaProfesor');
                tabla.innerHTML = "";

                if (snap.exists()) {
                    snap.forEach(child => {
                        const c = child.val();
                        if (c.profesor === nombreDocente) {
                            const badge = estaActiva ? 
                                '<span class="status-badge status-on">EN CURSO / ENERGÍA ON</span>' : 
                                '<span class="status-badge status-off">SIN INICIAR / ENERGÍA OFF</span>';
                            
                            const btnEnergia = estaActiva ?
                                `<button class="btn btn-terminar" onclick="setAsistencia(false)">TERMINAR CLASE</button>` :
                                `<button class="btn btn-iniciar" onclick="setAsistencia(true)">INICIAR CLASE</button>`;

                            tabla.innerHTML += `
                                <tr>
                                    <td><span class="hora-tag">${c.h_i}:${c.m_i.toString().padStart(2,'0')} - ${c.h_f}:${c.m_f.toString().padStart(2,'0')}</span></td>
                                    <td><b>${c.materia}</b></td>
                                    <td>${badge}</td>
                                    <td>${btnEnergia}</td>
                                    <td>
                                        <button class="btn btn-cancelar" onclick="cancelarClase('${child.key}')">ELIMINAR</button>
                                    </td>
                                </tr>`;
                        }
                    });
                } else {
                    tabla.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No tiene clases asignadas hoy.</td></tr>";
                }
            });
        });
    }

    // FUNCIÓN CLAVE: Activa o desactiva la "llave" del ESP32
    function setAsistencia(estado) {
        db.ref(`${rutaAula}/config/asistencia`).set(estado)
        .then(() => {
            const msg = estado ? "Clase iniciada. El sistema de iluminación está activo." : "Clase terminada. Energía cortada.";
            console.log(msg);
        });
    }

    function cancelarClase(idClase) {
        if (confirm("¿Seguro que desea eliminar esta clase de la agenda?")) {
            db.ref(`${rutaAula}/agenda/${idClase}`).remove();
            // Por seguridad, si cancela la clase, cortamos la energía
            setAsistencia(false);
        }
    }

    cargarClases();
</script>

</body>
</html>
